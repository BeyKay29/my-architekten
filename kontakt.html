<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | myArchitekten Dortmund — Studio für Architektur</title>
    <meta name="description"
        content="Kontaktieren Sie myArchitekten. Studio für exklusive Architekturplanung in Dortmund. Wir freuen uns auf Ihr Projekt.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/logo.png" type="image/png">
    <style>
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--c-text-s);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--c-line);
            border-radius: var(--radius-s);
            padding: 16px;
            color: var(--c-text);
            font-family: inherit;
            transition: var(--t-fast);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--c-accent);
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><img src="images/logo.png" alt="myArchitekten"></a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Start</a>
                <a href="ueber-uns.html" class="nav-link">Studio</a>
                <a href="leistungen.html" class="nav-link">Expertise</a>
                <a href="nutzungsaenderung.html" class="nav-link">Umnutzung</a>
                <a href="kontakt.html" class="nav-link active">Kontakt</a>
            </div>
            <a href="kontakt.html" class="nav-cta">Projekt anfragen</a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menü öffnen">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
        <div class="mobile-menu-content">
            <a href="index.html" class="mobile-link">Start</a>
            <a href="ueber-uns.html" class="mobile-link">Studio</a>
            <a href="leistungen.html" class="mobile-link">Expertise</a>
            <a href="nutzungsaenderung.html" class="mobile-link">Umnutzung</a>
            <a href="kontakt.html" class="mobile-link active">Kontakt</a>
            <a href="kontakt.html" class="mobile-cta">Projekt anfragen</a>
        </div>
    </div>

    <section class="hero" style="min-height: 50vh;">
        <div class="container">
            <div class="hero-content">
                <span class="section-tag">Anfrage</span>
                <h1 class="hero-title">Lassen Sie uns<br><span class="hero-title-accent">Sprechen.</span></h1>
            </div>
        </div>
    </section>

    <section class="philosophy" style="padding-top: 0;">
        <div class="container">
            <div class="philosophy-grid">
                <div class="contact-form-sidebar" data-animate>
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-input" placeholder="Ihr Name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">E-Mail</label>
                            <input type="email" class="form-input" placeholder="hallo@beispiel.de" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Projekt</label>
                            <input type="text" class="form-input" placeholder="Um was geht es?">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Nachricht</label>
                            <textarea class="form-textarea" rows="5"
                                placeholder="Details zu Ihrem Vorhaben..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary"
                            style="width: 100%; justify-content: center;">Anfrage senden</button>
                    </form>
                </div>
                <div class="contact-info-block" data-animate>
                    <div class="service-card" style="margin-bottom: 24px; padding: 32px;">
                        <h4 class="footer-heading" style="margin-bottom: 8px;">Studio Dortmund</h4>
                        <p class="philosophy-text" style="font-size: 16px; margin-bottom: 8px;">Rheinlanddamm
                            201<br>44139 Dortmund</p>
                        <p class="philosophy-text" style="font-size: 16px;">T: 0231 1372 8210<br>M:
                            info@my-architekten.de</p>
                    </div>
                    <div class="philosophy-image" style="height: 300px;">
                        <img src="images/modern-house.png" alt="Office" style="height: 100%; object-fit: cover;">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2025 myArchitekten. Professional Studio.
            </div>
        </div>
    </footer>
    <script src="main.js"></script>
</body>

</html>
